{% extends 'jobs/base.html' %}

{% block content %}
<h2>Saved Jobs</h2>

<div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-3">
    {% for job in jobs %}
    <div class="col">
        <div class="card h-100">
            <img src="{{ job.image.url }}" class="card-img-top" style="height:200px; object-fit:cover;">
            <div class="card-body">
                <h5>{{ job.title }}</h5>
                <p>{{ job.description }}</p>
                 <p><strong>County:</strong> {{ job.county }}</p>,
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
