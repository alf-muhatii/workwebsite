{% extends 'jobs/base.html' %}
{% block content %}


<div class="container mt-4">
    <h2 class="mb-4">Post a Job</h2>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Post Job</button>
    </form>
</div>

{% endblock %}
