{% extends 'jobs/base.html' %}

{% block content %}
<h2>Delete Job: {{ job.title }}</h2>
<p>Are you sure you want to delete this job?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, Delete</button>
    <a href="{% url 'home' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
