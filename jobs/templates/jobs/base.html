<!DOCTYPE html>
<html>
<head>
    <title>Job Site</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>

body.dark-mode {
    background-color: #121212;
    color: #e0e0e0;
}

body.dark-mode .card {
    background-color: #1e1e1e;
    color: #e0e0e0;
}

body.dark-mode .btn-outline-primary {
    color: #e0e0e0;
    border-color: #e0e0e0;
}

body.dark-mode .profile-pic,
body.dark-mode .job-thumbnail {
    border-color: #555; /* subtle border in dark mode */
}
    </style>
</head>
<body  class="{% if user.is_authenticated and user.profile.dark_mode %}dark-mode{% endif %}">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg {% if user.is_authenticated and user.profile.dark_mode %}navbar-dark bg-dark{% else %}navbar-light bg-light{% endif %}">
    <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">JobSite</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">

                {% if user.is_authenticated %}
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'profile' %}">Profile</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'home' %}">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'saved_jobs' %}">Saved Jobs</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'post_job' %}">Post Job</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'logout' %}">Logout</a>
                    </li>
                {% else %}
                     <li class="nav-item">
                        <a class="nav-link" href="{% url 'home' %}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'login' %}">Login</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'register' %}">Register</a>
                    </li>
                {% endif %}
            </ul>
        </div>
    </div>
</nav>

<!-- Page content -->
<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

</body>
</html>
